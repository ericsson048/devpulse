name: devpulse
description: DevPulse - Unified Development Learning Engine
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  shared_preferences: ^2.5.5
  video_player: ^2.10.1
  youtube_player_flutter: ^10.0.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.0
  flutter_local_notifications: 22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0B1326"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
